[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[project]
name = "smartscroll-shared"
version = "0.1.0"
description = "Shared Pydantic models for SmartScroll"
requires-python = ">=3.12"
dependencies = [
    "pydantic>=2.10.0",
]

[tool.hatch.build.targets.wheel]
packages = ["smartscroll_shared"]
