[project]
name = "smartscroll"
version = "0.1.0"
description = "TikTok-style AI-narrated PDF summaries"
readme = "README.md"
requires-python = ">=3.12"

[tool.uv.workspace]
members = ["apps/api", "packages/shared"]

[tool.ruff]
line-length = 100
target-version = "py312"

[tool.ruff.lint]
select = ["E", "W", "F", "I", "B", "C4", "UP", "N", "SIM", "RUF", "ASYNC"]
ignore = ["E501"]

[tool.ruff.format]
quote-style = "double"
indent-style = "space"
